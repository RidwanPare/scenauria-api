version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scenauria-postgres
    environment:
      POSTGRES_DB: scenauria
      POSTGRES_USER: scenauria
      POSTGRES_PASSWORD: scenauria
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scenauria']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scenauria-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
